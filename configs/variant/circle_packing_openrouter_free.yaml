# Circle packing variant using OpenRouter free-tier routing for mutation/code-writing.
# Usage:
#   shinka_launch variant=circle_packing_openrouter_free
# Requires:
#   OPENROUTER_API_KEY in environment or .env

defaults:
  - override /database@_global_: island_small
  - override /evolution@_global_: small_budget
  - override /task@_global_: circle_packing
  - override /cluster@_global_: local
  - _self_

variant_suffix: "_openrouter_free"

evo_config:
  # Backbone mutation model (OpenRouter provider auto-selected by slash model id)
  llm_models:
    - openrouter/free

  # Minimal pipeline: disable embeddings so no extra embedding provider key is needed.
  embedding_model: null

  # Keep novelty/meta paths off unless explicitly enabled elsewhere.
  novelty_llm_models: null
  meta_llm_models: null

  # Small budget for quick validation runs.
  num_generations: 5
  max_parallel_jobs: 1
